cluster_formation.peer_discovery_backend = classic_config

# the backend can also be specified using its module name
# cluster_formation.peer_discovery_backend = rabbit_peer_discovery_classic_config

cluster_formation.classic_config.nodes.1 = rabbit@node1
cluster_formation.classic_config.nodes.2 = rabbit@node2
cluster_formation.classic_config.nodes.3 = rabbit@node3


listeners.ssl.default = 5671

ssl_options.cacertfile = /etc/rabbitmq/certs/rootCA.crt
ssl_options.certfile   = /etc/rabbitmq/certs/localhost.crt
ssl_options.keyfile    = /etc/rabbitmq/certs/localhost.key
ssl_options.verify     = verify_peer
ssl_options.fail_if_no_peer_cert = true




# Management UI over HTTPS
management.ssl.port       = 15671
management.ssl.cacertfile = /etc/rabbitmq/certs/rootCA.crt
management.ssl.certfile   = /etc/rabbitmq/certs/localhost.crt
management.ssl.keyfile    = /etc/rabbitmq/certs/localhost.key
