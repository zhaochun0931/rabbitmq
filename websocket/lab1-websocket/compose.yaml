services:
  node1:
    image: rabbitmq:management
    # image: rabbitmq:3.13.7-management
    hostname: node1
    container_name: node1
    environment:
      - RABBITMQ_ERLANG_COOKIE=rabbitmq  # A shared secret for clustering
      - RABBITMQ_DEFAULT_USER=admin        # Set the default username
      - RABBITMQ_DEFAULT_PASS=password    # Set the default password
    ports:
      - "15672:15672"  # RabbitMQ management UI for node 1
      - "15675:15675"  # RabbitMQ 
      - "15676:15676"  # RabbitMQ 
      - "5672:5672"    # AMQP protocol
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - ./enabled_plugins:/etc/rabbitmq/enabled_plugins
      - ./certs:/etc/rabbitmq/certs
  # Mounts the local ./data folder to the container's RabbitMQ data path
      - ./node1:/var/lib/rabbitmq
    networks:
      - rabbitmq-net



  perf-test:
      image: pivotalrabbitmq/perf-test:latest
      container_name: perf-test
      entrypoint: ["sh", "-c", "sleep infinity"]
      networks:
        - rabbitmq-net
      depends_on:
        - node1


networks:
  rabbitmq-net:
    driver: bridge
