services:
  node2:
    image: erlang:latest
    container_name: node2
    hostname: node2
    networks:
      erlang-net:
        aliases:
          - node2.local
    # Start node without shell and sleep indefinitely
    command:
      - erl
      - "-name"
      - "node2@node2.local"
      - "-setcookie"
      - "secretcookie"
      - "-noshell"
      - "-eval"
      - "io:format('node2 is up and waiting...~n', []), timer:sleep(infinity)."

  node3:
    image: erlang:latest
    container_name: node3
    hostname: node3
    networks:
      erlang-net:
        aliases:
          - node3.local
    # Start node without shell and sleep indefinitely
    command:
      - erl
      - "-name"
      - "node3@node3.local"
      - "-setcookie"
      - "secretcookie"
      - "-noshell"
      - "-eval"
      - "io:format('node3 is up and waiting...~n', []), timer:sleep(infinity)."

  node1:
    image: erlang:latest
    container_name: node1
    hostname: node1
    depends_on:
      - node2
      - node3
    networks:
      erlang-net:
        aliases:
          - node1.local
    # Wait for other nodes, ping them to form cluster, send message, and sleep
    command:
      - erl
      - "-name"
      - "node1@node1.local"
      - "-setcookie"
      - "secretcookie"
      - "-noshell"
      - "-eval"
      - >
        timer:sleep(2000),
        net_adm:ping('node2@node2.local'),
        net_adm:ping('node3@node3.local'),
        io:format('--- CLUSTER FORMED! Connected to: ~p ---~n', [nodes()]),
        rpc:multicall(nodes(), io, format, ["--- MESSAGE RECEIVED: Hello from ~p! ---~n", [node()]]),
        timer:sleep(infinity).

networks:
  erlang-net:
    driver: bridge
